server:
  port: 8080

spring:
  application:
    name: booking-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/booking_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/atlas}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        spring.json.add.type.headers: 'false'
    consumer:
      group-id: booking-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: '*'
        spring.json.value.default.type: java.util.LinkedHashMap
        spring.json.use.type.headers: 'false'

clients:
  search:
    base-url: ${SEARCH_SERVICE_URL:http://localhost:8081}

atlas:
  outbox:
    poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:2000}
  booking:
    expiration:
      # Safety-net deadline for stale PENDING Bookings only (feature.md addendum — Timeout
      # Ownership). Outermost deadline in the cascade: SHALL be >= inventory reservation TTL +
      # margin, so owner timeouts (payment, then inventory TTL) fire first. INVENTORY_RESERVED is
      # settled by Payment's PaymentTimedOut, not by this job.
      pending-timeout: ${BOOKING_EXPIRATION_PENDING_TIMEOUT:30m}
      scan-interval-ms: ${BOOKING_EXPIRATION_SCAN_INTERVAL_MS:60000}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

#logging:
#  level:
#    com.atlas: INFO
#    org.springframework.security: WARN

logging:
  level:
    com.atlas: DEBUG
    org.springframework.security: TRACE
    org.springframework.security.web.FilterChainProxy: TRACE
    org.springframework.security.oauth2.server.resource: TRACE