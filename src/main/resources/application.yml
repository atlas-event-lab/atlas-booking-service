server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html

spring:
  application:
    name: booking-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/booking_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/atlas}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        spring.json.add.type.headers: 'false'
    consumer:
      group-id: booking-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.json.trusted.packages: 'com.atlas.booking.booking.event'
        spring.json.value.default.type: com.atlas.booking.booking.event.EventEnvelope
        spring.json.use.type.headers: 'false'

clients:
  flight:
    base-url: ${FLIGHT_SERVICE_URL:http://localhost:8082}
  hotel:
    base-url: ${HOTEL_SERVICE_URL:http://localhost:8083}
  frankfurter:
    base-url: https://api.frankfurter.dev

atlas:
  outbox:
    poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:2000}
  booking:
    expiration:
      # Safety-net deadline for stale PENDING Bookings only (feature.md addendum — Timeout
      # Ownership). Outermost deadline in the cascade: SHALL be >= inventory reservation TTL +
      # margin, so owner timeouts (payment, then inventory TTL) fire first. INVENTORY_RESERVED is
      # settled by Payment's PaymentTimedOut, not by this job.
      pending-timeout: ${BOOKING_EXPIRATION_PENDING_TIMEOUT:30m}
      scan-interval-ms: ${BOOKING_EXPIRATION_SCAN_INTERVAL_MS:60000}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.atlas: INFO
    org.springframework.security: WARN